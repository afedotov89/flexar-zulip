# Flexar Zulip Compose stack.
#
# Adapted from upstream zulip/docker-zulip compose.yaml (Apache-2.0).
#
# Key changes vs upstream:
#   - External ports: 8800 (HTTP) / 8843 (HTTPS). No SMTP exposure.
#     The host (rpi5) already has nginx on 80/443 for other projects.
#   - Image: pulled from cr.yandex/$REGISTRY/$CONTAINER:$TAG, defaults to
#     locally-built `flexar-zulip-server:dev` for local development.
#   - Secrets passed via environment variables (sourced from .env).
#     Production hardening: move to docker secrets files later.
#   - Restart policies + healthcheck + named volumes for persistence.
#
# Bring up:
#   docker compose --env-file .env up -d
#
# All values come from .env. See .env.example.

---
services:
  database:
    image: "zulip/zulip-postgresql:14"
    container_name: "${COMPOSE_PROJECT_NAME:-flexar-zulip}-database"
    restart: unless-stopped
    environment:
      POSTGRES_DB: "zulip"
      POSTGRES_USER: "zulip"
      POSTGRES_PASSWORD: "${ZULIP__POSTGRES_PASSWORD:?ZULIP__POSTGRES_PASSWORD required}"
    volumes:
      - "postgresql-14:/var/lib/postgresql/data:rw"
    networks:
      - flexar-zulip-net
    attach: false

  memcached:
    image: "memcached:alpine"
    container_name: "${COMPOSE_PROJECT_NAME:-flexar-zulip}-memcached"
    restart: unless-stopped
    command:
      - "sh"
      - "-euc"
      - |
        echo 'mech_list: plain' > "$$SASL_CONF_PATH"
        echo "zulip@$$HOSTNAME:$$MEMCACHED_PASSWORD" > "$$MEMCACHED_SASL_PWDB"
        echo "zulip@localhost:$$MEMCACHED_PASSWORD" >> "$$MEMCACHED_SASL_PWDB"
        exec memcached -S
    environment:
      SASL_CONF_PATH: "/home/memcache/memcached.conf"
      MEMCACHED_SASL_PWDB: "/home/memcache/memcached-sasl-db"
      MEMCACHED_PASSWORD: "${ZULIP__MEMCACHED_PASSWORD:?ZULIP__MEMCACHED_PASSWORD required}"
    networks:
      - flexar-zulip-net
    attach: false

  rabbitmq:
    image: "rabbitmq:4.2"
    container_name: "${COMPOSE_PROJECT_NAME:-flexar-zulip}-rabbitmq"
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: "zulip"
      RABBITMQ_DEFAULT_PASS: "${ZULIP__RABBITMQ_PASSWORD:?ZULIP__RABBITMQ_PASSWORD required}"
    volumes:
      - "rabbitmq:/var/lib/rabbitmq:rw"
    networks:
      - flexar-zulip-net
    attach: false

  redis:
    image: "redis:alpine"
    container_name: "${COMPOSE_PROJECT_NAME:-flexar-zulip}-redis"
    restart: unless-stopped
    command:
      - "sh"
      - "-euc"
      - '/usr/local/bin/docker-entrypoint.sh --requirepass "$$REDIS_PASSWORD"'
    environment:
      REDIS_PASSWORD: "${ZULIP__REDIS_PASSWORD:?ZULIP__REDIS_PASSWORD required}"
    volumes:
      - "redis:/data:rw"
    networks:
      - flexar-zulip-net
    attach: false

  zulip:
    # The image is pulled from cr.yandex by deploy_zulip.sh. For local
    # development, build with: `docker compose build zulip`.
    image: "${ZULIP_IMAGE:-flexar-zulip-server:dev}"
    container_name: "${COMPOSE_PROJECT_NAME:-flexar-zulip}-server"
    restart: unless-stopped
    build:
      context: ../..             # repo root
      dockerfile: flexar/deploy/Dockerfile
      platforms:
        - linux/arm64
    ports:
      - "${ZULIP_HTTP_PORT:-8800}:80"
      - "${ZULIP_HTTPS_PORT:-8843}:443"
    environment:
      # Core
      DB_HOST: "database"
      DB_HOST_PORT: "5432"
      SETTING_REMOTE_POSTGRES_HOST: "database"
      SETTING_MEMCACHED_LOCATION: "memcached:11211"
      SETTING_RABBITMQ_HOST: "rabbitmq"
      SETTING_REDIS_HOST: "redis"

      # Secrets surfaced from .env (Zulip entrypoint copies these into
      # /etc/zulip/zulip-secrets.conf at startup).
      ZULIP__POSTGRES_PASSWORD: "${ZULIP__POSTGRES_PASSWORD}"
      ZULIP__MEMCACHED_PASSWORD: "${ZULIP__MEMCACHED_PASSWORD}"
      ZULIP__RABBITMQ_PASSWORD: "${ZULIP__RABBITMQ_PASSWORD}"
      ZULIP__REDIS_PASSWORD: "${ZULIP__REDIS_PASSWORD}"
      SECRETS_secret_key: "${ZULIP__SECRET_KEY:?ZULIP__SECRET_KEY required}"
      SECRETS_email_password: "${ZULIP__EMAIL_PASSWORD:-}"

      # Public-facing config
      SETTING_EXTERNAL_HOST: "${ZULIP_EXTERNAL_HOST:?ZULIP_EXTERNAL_HOST required, e.g. flexar-hub.example.com or 95.84.162.15:8843}"
      SETTING_ZULIP_ADMINISTRATOR: "${ZULIP_ADMIN_EMAIL:?ZULIP_ADMIN_EMAIL required}"
      SETTING_EMAIL_HOST: "${SETTING_EMAIL_HOST:-}"
      SETTING_EMAIL_HOST_USER: "${SETTING_EMAIL_HOST_USER:-}"
      SETTING_EMAIL_PORT: "${SETTING_EMAIL_PORT:-587}"
      SETTING_EMAIL_USE_TLS: "${SETTING_EMAIL_USE_TLS:-True}"
      SETTING_NOREPLY_EMAIL_ADDRESS: "${SETTING_NOREPLY_EMAIL_ADDRESS:-noreply@flexar.local}"

      # Auth backends (comma-separated). EmailAuthBackend is the simplest;
      # for production add GoogleAuthBackend / GitHubAuthBackend / etc.
      ZULIP_AUTH_BACKENDS: "${ZULIP_AUTH_BACKENDS:-EmailAuthBackend}"

      # Behind a reverse proxy? Set LOADBALANCER_IPS=... and TRUST_GATEWAY_IP=true.
      LOADBALANCER_IPS: "${LOADBALANCER_IPS:-}"
      TRUST_GATEWAY_IP: "${TRUST_GATEWAY_IP:-false}"

      # Generate self-signed cert on first start unless cert provided.
      # Set CERTIFICATES=self-signed for explicit self-signed.
      # Set CERTIFICATES=mounted and mount /etc/letsencrypt for real certs.
      CERTIFICATES: "${CERTIFICATES:-self-signed}"

      # Tame nginx worker count for small ARM hosts.
      CONFIG_application_server__nginx_worker_processes: "${NGINX_WORKERS:-2}"

      # Disable Zulip's automated backups by default (we manage backups separately).
      AUTO_BACKUP_ENABLED: "${AUTO_BACKUP_ENABLED:-false}"

    volumes:
      - "zulip-data:/data:rw"
    ulimits:
      nofile:
        soft: 1000000
        hard: 1048576
    depends_on:
      - database
      - memcached
      - rabbitmq
      - redis
    networks:
      - flexar-zulip-net

volumes:
  zulip-data:
    name: "${COMPOSE_PROJECT_NAME:-flexar-zulip}_zulip-data"
  postgresql-14:
    name: "${COMPOSE_PROJECT_NAME:-flexar-zulip}_postgresql-14"
  rabbitmq:
    name: "${COMPOSE_PROJECT_NAME:-flexar-zulip}_rabbitmq"
  redis:
    name: "${COMPOSE_PROJECT_NAME:-flexar-zulip}_redis"

networks:
  flexar-zulip-net:
    name: "${COMPOSE_PROJECT_NAME:-flexar-zulip}-net"
    driver: bridge
